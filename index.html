<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Form with Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Registration Form</h1>
      <form id="registrationForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            aria-describedby="name-error"
          />
          <div id="name-error" class="error-message" role="alert"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address:</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            aria-describedby="email-error"
          />
          <div id="email-error" class="error-message" role="alert"></div>
        </div>

        <div class="form-group">
          <label for="age">Age:</label>
          <input
            type="number"
            id="age"
            name="age"
            min="1"
            max="120"
            required
            aria-describedby="age-error"
          />
          <div id="age-error" class="error-message" role="alert"></div>
        </div>

        <div class="form-group">
          <fieldset>
            <legend>Gender</legend>
            <div class="radio-group">
              <label class="radio-item">
                <input
                  type="radio"
                  id="male"
                  name="gender"
                  value="male"
                  required
                />
                <label for="male">Male</label>
              </label>
              <label class="radio-item">
                <input type="radio" id="female" name="gender" value="female" />
                <label for="female">Female</label>
              </label>
              <label class="radio-item">
                <input type="radio" id="other" name="gender" value="other" />
                <label for="other">Other</label>
              </label>
            </div>
          </fieldset>
          <div id="gender-error" class="error-message" role="alert"></div>
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="terms"
              name="terms"
              required
              aria-describedby="terms-error"
            />
            <label for="terms"
              >I agree to the
              <a href="#" target="_blank">Terms and Conditions</a></label
            >
          </div>
          <div id="terms-error" class="error-message" role="alert"></div>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
